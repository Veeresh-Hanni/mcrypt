name: mcrypt Global Package Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # Build native binaries for all platforms first
  build-native:
    name: Build Native Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: libmcrypt_native.so
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: mcrypt_native.dll
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: libmcrypt_native.dylib
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Build Release Binary
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          retention-days: 1

  # Java: Publish to GitHub Packages
  publish-java:
    name: Publish Java (GitHub Packages)
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Download All Binaries
        uses: actions/download-artifact@v4
        with:
          path: ./binaries
      
      - name: Organize Binaries for Java
        shell: bash
        run: |
          mkdir -p bindings/java/src/main/resources/linux-x86-64
          mkdir -p bindings/java/src/main/resources/macos-x86-64
          mkdir -p bindings/java/src/main/resources/windows-x86-64
          cp binaries/binary-x86_64-unknown-linux-gnu/libmcrypt_native.so bindings/java/src/main/resources/linux-x86-64/
          cp binaries/binary-x86_64-apple-darwin/libmcrypt_native.dylib bindings/java/src/main/resources/macos-x86-64/
          cp binaries/binary-x86_64-pc-windows-msvc/mcrypt_native.dll bindings/java/src/main/resources/windows-x86-64/
          ls -R bindings/java/src/main/resources/
        
      - name: Build Java Package
        run: |
          cd bindings/java
          mvn clean package -DskipTests
      
      - name: Create Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
            xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
            xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 http://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.ACCESS_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF
      
      - name: Publish to GitHub Packages
        run: |
          cd bindings/java
          mvn deploy -DskipTests
        env:
          JAVA_TOOL_OPTIONS: -Duser.home=$HOME

  # Node.js: Publish to NPM
  publish-nodejs:
    name: Publish Node.js (NPM)
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Download All Binaries
        uses: actions/download-artifact@v4
        with:
          path: ./binaries
      
      - name: Organize Binaries for Node.js
        shell: bash
        run: |
          mkdir -p bindings/nodejs/lib
          cp binaries/binary-x86_64-unknown-linux-gnu/libmcrypt_native.so bindings/nodejs/lib/ 2>/dev/null || true
          cp binaries/binary-x86_64-apple-darwin/libmcrypt_native.dylib bindings/nodejs/lib/ 2>/dev/null || true
          cp binaries/binary-x86_64-pc-windows-msvc/mcrypt_native.dll bindings/nodejs/lib/ 2>/dev/null || true
          ls -la bindings/nodejs/lib/
          
      - name: Publish to NPM
        run: |
          cd bindings/nodejs
          npm install
          npm publish --allow-same-version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Python: Build wheels and publish to PyPI
  publish-python:
    name: Publish Python (PyPI)
    runs-on: ${{ matrix.os }}
    needs: build-native
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Download All Binaries
        uses: actions/download-artifact@v4
        with:
          path: ./binaries
      
      - name: Organize Binaries for Python
        shell: bash
        run: |
          mkdir -p target/release
          cp binaries/binary-x86_64-unknown-linux-gnu/libmcrypt_native.so target/release/ 2>/dev/null || true
          cp binaries/binary-x86_64-apple-darwin/libmcrypt_native.dylib target/release/ 2>/dev/null || true
          cp binaries/binary-x86_64-pc-windows-msvc/mcrypt_native.dll target/release/ 2>/dev/null || true
          ls -la target/release/
      
      - name: Install dependencies
        run: pip install maturin twine
        
      - name: Build Python Wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist
          
      - name: Upload wheels to PyPI
        run: twine upload dist/* --skip-existing
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}