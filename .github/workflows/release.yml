name: mcrypt Global Package Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ---------------- 1. PYTHON BUILD & TWINE PUBLISH ----------------
  publish-python:
    name: Build & Publish Python (PyPI via Twine)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Maturin and Twine
        run: pip install maturin twine
        
      - name: Build Python Wheels via Maturin
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist
          
      # Twine ಬಳಸಿ ಪಕ್ಕಾ ಸೆಕ್ಯೂರ್ ಆಗಿ PyPI ಗೆ ಅಪ್ಲೋಡ್ ಮಾಡುವುದು
      - name: Publish to PyPI via Twine
        run: twine upload dist/* --skip-existing
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # ---------------- 2. NODE.JS BUILD & NPM PUBLISH ----------------
  publish-nodejs:
    name: Build & Publish Node.js (NPM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          
      - name: Build and Publish to NPM
        run: |
          cd bindings/nodejs
          npm install
          npm publish --allow-same-version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}