name: mcrypt Global Package Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ---------------- 1. PYTHON BUILD & TWINE PUBLISH ----------------
  publish-python:
    name: Build & Publish Python (PyPI via Twine)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # ಫಿಕ್ಸ್: ಒಂದು ಓಎಸ್ ಫೇಲ್ ಆದ್ರೆ ಅಥವಾ ಸ್ಲೋ ಆದ್ರೆ ಇನ್ನೊಂದನ್ನು ಕ್ಯಾನ್ಸಲ್ ಮಾಡಬೇಡ!
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Maturin and Twine
        run: pip install maturin twine
        
      - name: Build Python Wheels via Maturin
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist
          
      - name: Publish to PyPI via Twine
        run: twine upload dist/* --skip-existing
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # ---------------- 3. JAVA BUILD & MAVEN PUBLISH ----------------
  publish-java:
    name: Build & Publish Java (Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
          settings-path: ${{ github.workspace }} # location for the settings.xml file
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Build Rust Library (Linux)
        run: |
          cargo build --release
          mkdir -p bindings/java/src/main/resources/linux-x86-64
          cp target/release/libmcrypt_native.so bindings/java/src/main/resources/linux-x86-64/
          
      # Note: For a complete cross-platform JAR, you'd typically build for Win/Mac as well 
      # and bundle them all. We are building Linux here to verify the Java bindings.
      
      - name: Build and Test Java Bindings
        run: |
          cd bindings/java
          mvn clean package
          
      - name: Publish to GitHub Packages
        run: |
          cd bindings/java
          # mvn deploy -s $GITHUB_WORKSPACE/settings.xml
          echo "Maven deploy placeholder - requires full setup for OSSRH or GH Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
  # ---------------- 2. NODE.JS BUILD & NPM PUBLISH ----------------
  publish-nodejs:
    name: Build & Publish Node.js (NPM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          
      - name: Build and Publish to NPM
        run: |
          cd bindings/nodejs
          npm install
          # ಒಂದು ವೇಳೆ npm publish ಗೆ ಇನ್ನೂ ಟೋಕನ್ ಸೆಟ್ ಮಾಡದಿದ್ದರೆ ಬಿಲ್ಡ್ ಫೇಲ್ ಆಗಬಾರದು ಅಂದ್ರೆ ಇನ್ ಸದ್ಯಕ್ಕೆ echo ಇಡಬಹುದು
          npm publish --allow-same-version || echo "NPM token configuration pending"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}