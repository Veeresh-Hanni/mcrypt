name: mcrypt Global Package Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # Build native binaries for all platforms first
  build-native:
    name: Build Native Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: libmcrypt_native.so
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: mcrypt_native.dll
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: libmcrypt_native.dylib
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Build Release Binary
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          retention-days: 1

  # Download all binaries and publish
  publish-all:
    name: Publish All Packages
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - uses: actions/checkout@v4
      
      - name: Download All Binaries
        uses: actions/download-artifact@v4
        with:
          path: ./binaries

      - name: Organize Binaries
        run: |
          mkdir -p target/release
          cp binaries/binary-x86_64-unknown-linux-gnu/libmcrypt_native.so target/release/
          cp binaries/binary-x86_64-pc-windows-msvc/mcrypt_native.dll target/release/
          cp binaries/binary-x86_64-apple-darwin/libmcrypt_native.dylib target/release/
          ls -la target/release/

  # Python Build & PyPI Publish
  publish-python:
    name: Build & Publish Python (PyPI)
    runs-on: ubuntu-latest
    needs: publish-all
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Download All Binaries
        uses: actions/download-artifact@v4
        with:
          path: ./binaries
      
      - name: Organize Binaries for Python
        run: |
          mkdir -p target/release
          cp binaries/binary-x86_64-unknown-linux-gnu/libmcrypt_native.so target/release/
          cp binaries/binary-x86_64-pc-windows-msvc/mcrypt_native.dll target/release/
          cp binaries/binary-x86_64-apple-darwin/libmcrypt_native.dylib target/release/

      - name: Install Maturin and Twine
        run: pip install maturin twine
        
      - name: Build Python Wheels via Maturin
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist
          
      - name: Publish to PyPI via Twine
        run: twine upload dist/* --skip-existing
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # Java Build & Maven Publish
  publish-java:
    name: Build & Publish Java (Maven)
    runs-on: ubuntu-latest
    needs: publish-all
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}
      
      - name: Download All Binaries
        uses: actions/download-artifact@v4
        with:
          path: ./binaries
      
      - name: Organize Binaries for Java
        run: |
          mkdir -p target/release
          mkdir -p bindings/java/src/main/resources/linux-x86-64
          mkdir -p bindings/java/src/main/resources/windows-x86-64
          mkdir -p bindings/java/src/main/resources/macos-x86-64
          cp binaries/binary-x86_64-unknown-linux-gnu/libmcrypt_native.so bindings/java/src/main/resources/linux-x86-64/
          cp binaries/binary-x86_64-pc-windows-msvc/mcrypt_native.dll bindings/java/src/main/resources/windows-x86-64/
          cp binaries/binary-x86_64-apple-darwin/libmcrypt_native.dylib bindings/java/src/main/resources/macos-x86-64/
        
      - name: Build and Test Java Bindings
        run: |
          cd bindings/java
          mvn clean package
          
      - name: Publish to GitHub Packages
        run: |
          cd bindings/java
          echo "Maven deploy placeholder - configure OSSRH or GitHub Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Node.js Build & NPM Publish
  publish-nodejs:
    name: Build & Publish Node.js (NPM)
    runs-on: ubuntu-latest
    needs: publish-all
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Download All Binaries
        uses: actions/download-artifact@v4
        with:
          path: ./binaries
      
      - name: Organize Binaries for Node.js
        run: |
          mkdir -p target/release
          mkdir -p bindings/nodejs/lib
          cp binaries/binary-x86_64-unknown-linux-gnu/libmcrypt_native.so bindings/nodejs/lib/
          cp binaries/binary-x86_64-pc-windows-msvc/mcrypt_native.dll bindings/nodejs/lib/
          cp binaries/binary-x86_64-apple-darwin/libmcrypt_native.dylib bindings/nodejs/lib/
          
      - name: Build and Publish to NPM
        run: |
          cd bindings/nodejs
          npm install
          npm publish --allow-same-version || echo "NPM token configuration pending"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}